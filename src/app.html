<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0"
			rel="stylesheet"
		/>
		<meta
			name="description"
			content="VELO - GitHub Trending ranked by performance metrics. Discover fast, efficient repositories."
		/>
		<meta name="theme-color" content="#c4f20d" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="VELO - GitHub Trending Ranked" />
		<meta
			property="og:description"
			content="GitHub Trending ranked by performance metrics. Discover fast, efficient repositories."
		/>
		<meta property="og:site_name" content="VELO" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary" />
		<meta name="twitter:title" content="VELO - GitHub Trending Ranked" />
		<meta
			name="twitter:description"
			content="GitHub Trending ranked by performance metrics. Discover fast, efficient repositories."
		/>

		<title>VELO - GitHub Trending Ranked</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
