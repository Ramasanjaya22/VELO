<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" type="image/svg+xml" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" type="image/png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,0"
			rel="stylesheet"
		/>
		<meta
			name="description"
			content="VELO is a curated AI tools directory with clear ranking, fast discovery, and minimal noise."
		/>
		<meta name="theme-color" content="#b4df3d" />

		<script>
			(function () {
				const saved = localStorage.getItem('theme');
				const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
				const theme = saved || (prefersDark ? 'dark' : 'light');
				document.documentElement.setAttribute('data-theme', theme);
				const themeColor = document.querySelector('meta[name="theme-color"]');
				if (themeColor) {
					themeColor.setAttribute('content', theme === 'dark' ? '#090b09' : '#b4df3d');
				}
			})();
		</script>

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:title" content="VELO — Curated AI Tools Directory" />
		<meta
			property="og:description"
			content="Curated AI tools directory for fast discovery, ranking, and filtering."
		/>
		<meta property="og:site_name" content="VELO" />
		<meta property="og:url" content="https://velo-428.pages.dev/" />
		<meta property="og:image" content="https://velo-428.pages.dev/og-image.svg" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:image:type" content="image/svg+xml" />

		<!-- Twitter -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:title" content="VELO — Curated AI Tools Directory" />
		<meta
			name="twitter:description"
			content="Curated AI tools directory for fast discovery, ranking, and filtering."
		/>
		<meta name="twitter:image" content="https://velo-428.pages.dev/og-image.svg" />

		<title>VELO — Curated AI Tools Directory</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
